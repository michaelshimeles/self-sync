<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<title>Self Sync | Local-first sync for SvelteKit + Effect</title>
		<meta
			name="description"
			content="A local-first sync framework for SvelteKit and Effect, backed by WebSockets, IndexedDB, Postgres, and MySQL."
		/>
		<link rel="canonical" href="https://selfs-goshen-labs.vercel.app/" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta name="theme-color" content="#0f172a" />
		<meta property="og:site_name" content="Self Sync" />
		<meta property="og:title" content="Self Sync | Local-first sync for SvelteKit + Effect" />
		<meta
			property="og:description"
			content="A local-first sync framework for SvelteKit and Effect, backed by WebSockets, IndexedDB, Postgres, and MySQL."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://selfs-goshen-labs.vercel.app/" />
		<meta property="og:image" content="https://selfs-goshen-labs.vercel.app/og.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="Self Sync local-first sync framework preview" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Self Sync | Local-first sync for SvelteKit + Effect" />
		<meta
			name="twitter:description"
			content="A local-first sync framework for SvelteKit and Effect, backed by WebSockets, IndexedDB, Postgres, and MySQL."
		/>
		<meta name="twitter:image" content="https://selfs-goshen-labs.vercel.app/og.png" />
		<meta name="twitter:image:alt" content="Self Sync local-first sync framework preview" />
		<script>
			(() => {
				const reloadKey = 'self-sync:asset-reload-at';
				const isAssetLoadError = (value) => {
					const text = String(value?.message ?? value ?? '');
					return (
						text.includes('Failed to fetch dynamically imported module') ||
						text.includes('Importing a module script failed') ||
						text.includes('/_app/immutable/')
					);
				};
				const reloadOnce = () => {
					const lastReload = Number(sessionStorage.getItem(reloadKey) ?? 0);
					if (Date.now() - lastReload < 15000) return;

					sessionStorage.setItem(reloadKey, String(Date.now()));
					const url = new URL(location.href);
					url.searchParams.set('__self_sync_reload', String(Date.now()));
					location.replace(url);
				};

				window.addEventListener('unhandledrejection', (event) => {
					if (isAssetLoadError(event.reason)) reloadOnce();
				});
				window.addEventListener(
					'error',
					(event) => {
						if (isAssetLoadError(event.message) || isAssetLoadError(event.filename)) {
							reloadOnce();
						}
					},
					true
				);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
